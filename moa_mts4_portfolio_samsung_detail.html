    .icon-button { width:36px; height:36px; border:1px solid var(--line); border-radius:8px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; }

    .app-subtitle { color:var(--muted); font-size:10px; font-weight:400; }
    .content { position:absolute; left:18px; right:18px; top:94px; bottom:78px; overflow-y:auto; padding-bottom:10px; }
    .card { border:1px solid var(--line); border-radius:12px; background:white; padding:12px; font-size:12px; line-height:18px; }
    .head { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
    .badge { border:1px solid var(--line); border-radius:999px; padding:3px 8px; color:var(--muted); background:#fafafa; font-size:10px; font-weight:800; }
    .row { display:grid; grid-template-columns:122px 1fr; gap:10px; padding:7px 0; border-top:1px solid #efefef; }
    .row b { color:var(--muted); }
    .section-title { margin:12px 0 7px; font-size:13px; font-weight:800; }
    .actions { display:grid; grid-template-columns:1fr; gap:8px; margin-top:12px; }
    .button { min-height:38px; border:1px solid #9d9d9d; border-radius:10px; background:var(--ink); color:white; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 10px; font-size:12px; font-weight:800; }
    .bottom-nav { position:absolute; left:0; right:0; bottom:0; height:62px; border-top:1px solid var(--line); background:white; display:grid; grid-template-columns:repeat(5,1fr); align-items:center; text-align:center; font-size:10px; color:var(--muted); }
    .nav-item { display:grid; gap:4px; justify-items:center; }
    .nav-icon { width:22px; height:18px; border:1px solid currentColor; border-radius:4px; }
    .nav-item.active { color:var(--blue); font-weight:800; }
    .caption { margin-top:18px; text-align:center; color:var(--muted); font-size:14px; font-weight:800; }
